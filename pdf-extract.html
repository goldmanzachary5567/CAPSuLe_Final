<!DOCTYPE html>
<html>
<head>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>
<pre id="out" style="font-size:11px;white-space:pre-wrap;max-width:900px;"></pre>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
(async () => {
  const pdf = await pdfjsLib.getDocument('uploads/CAPSuLe_Microdose.pptx.pdf').promise;
  let all = '';
  for (let i = 1; i <= Math.min(pdf.numPages, 30); i++) {
    const page = await pdf.getPage(i);
    const tc = await page.getTextContent();
    const txt = tc.items.map(it => it.str).join(' ');
    all += `\n--- PAGE ${i} ---\n${txt}`;
  }
  document.getElementById('out').textContent = all;
})();
</script>
</body>
</html>
